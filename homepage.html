<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="images/github-logo.png" type="image/x-icon">
    <!-- Daisy UI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <title>GitHub Issues Tracker</title>
</head>
<style>
    .default-btn{
        background-color: white;
        color: #64748B;
    }
    .toggle{
        background-color: #4A00FF;
        color: white;
        padding: 12px 49px 12px 49px;
    }
    .medium{
       background-color: #F59E0B; 
    }
    .low{
        background-color: #9CA3AF ;
    }
    .medium-btn{
        background-color: #FFF6D1;
        color: #F59E0B;
    }
    .low-btn{
        color: #9CA3AF;
        background-color: #EEEFF2;
    }
    .open{
        color: #00A96E;
    }
    .close{
        color: #A855F7;
    }
    .closetopboder{
        border-top: #A855F7;
    }
    .enhancement{
        color: #00A96E;
        background-color: #DEFCE8;
        border-color: #BBF7D0;
    }
    .help{
        color: #D97706;
        border-color: #FDE68A;
        background-color: #FFF8DB;
    }
    .good{
        color: #64748B;
        border-color: #9CA3AF;
        background-color: #e6ecf8;
    }
</style>
<body class="bg-[#F8FAFC]">
    <section class="Navbar">
    <div class="navbar bg-base-100 shadow-sm px-3 md:px-10">
  <div class="flex-1">
    <div class="left-content flex items-center gap-2">
    <img class="w-10 h-10" src="images/github-logo.png" alt="">
    <a class=" font-bold text-[14px]  md:text-xl">GitHub Issues Tracker</a>
    </div>
  </div>
  <div class="flex gap-2">
    <input id="search" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
    <button id="searchbtn" class="btn btn-primary">Search</button>
  </div>
</div>
    </section>

    <section class="toggling-btn mt-[30px] md:mt-[60px] mb-4 bg-white pl-6 py-4 md:py-6 w-11/12 md:w-10/12 mx-auto rounded-lg shadow">
        <button onclick="toggolebtn('allbtn')" id="allbtn" class="headingbtn btn px-[49px]  py-3 toggle">All</button>
        <button onclick="toggolebtn('openbtn')" id="openbtn" class="headingbtn btn px-[49px]  py-3">Open</button>
        <button onclick="toggolebtn('closebtn')" id="closebtn" class="headingbtn btn px-[49px] py-3 ">Close</button>
    </section>
    <section class="allissues w-11/12 md:w-10/12 mx-auto">
        <div class="navbar bg-base-100 shadow-sm rounded-t-lg flex justify-between md:justify-between px-4">
            <div class="leftside flex gap-2 items-center">
            <div class="apImage bg-gray-200 p-2 rounded-full"><img src="images/Aperture.png" alt=""></div>
            <div class="text-content">
            <h1 class="font-bold text-[16px] md:text-xl"><span id="totalissues">0</span> Issues</h1>
            <p class="text-[#64748B] text-[9px] md:text-[16px]">Track and manage your project issues</p>
            </div>
            </div>
            <div class="rightside flex items-center gap-4">
                <div class="open flex items-center gap-2">
                    <div class="openimg">
                    <img src="images/Ellipse 2.png" alt="">
                    </div>
                    <p>Open</p>
                </div>
                <div class="close flex items-center gap-2">
                    <div class="closeimg">
                    <img src="images/Ellipse 2 (1).png" alt="">
                    </div>
                    <p>close</p>
                </div>
            </div>
        </div>
    </section>

    <section id="allissuedisplay" class="allissues grid grid-cols-1 md:grid-cols-4 gap-3 w-11/12 md:w-10/12 mx-auto p-[27px] bg-[#FBFBFB] shadow">
         
    </section>


    <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
<dialog id="my_modal_1" class="modal">
  <div class="modal-box">
    <div id="details">
    <!-- <h3 class="text-lg font-bold">Hello!</h3>
    <p class="py-4">Press ESC key or click the button below to close</p> -->
    </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>
    <script src="script.js"></script>
</body>
</html>
