<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="images/github-logo.png" type="image/x-icon">
    <!-- Daisy UI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <title>GitHub Issues Tracker</title>
</head>
<style>
    .default-btn{
        background-color: white;
        color: #64748B;
    }
    .toggle{
        background-color: #4A00FF;
        color: white;
        padding: 12px 49px 12px 49px;
    }
</style>
<body class="bg-[#F8FAFC]">
    <section class="Navbar">
    <div class="navbar bg-base-100 shadow-sm px-3 md:px-10">
  <div class="flex-1">
    <div class="left-content flex">
    <img class="w-10 h-10" src="images/github-logo.png" alt="">
    <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
    </div>
  </div>
  <div class="flex gap-2">
    <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
    <button class="btn btn-primary">Search</button>
  </div>
</div>
    </section>

    <section class="toggling-btn mt-[60px] mb-4 bg-white pl-6 py-6 w-10/12 mx-auto rounded-lg shadow">
        <button onclick="toggolebtn('allbtn')" id="allbtn" class="headingbtn btn px-[49px]  py-3 toggle">All</button>
        <button onclick="toggolebtn('openbtn')" id="openbtn" class="headingbtn btn px-[49px]  py-3">Open</button>
        <button onclick="toggolebtn('closebtn')" id="closebtn" class="headingbtn btn px-[49px] py-3 ">Close</button>
    </section>
    <section>
        <h1>Hello</h1>
    </section>
    <script src="script.js"></script>
</body>
</html>
